<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشغّل الأفلام</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #video-wrap { position: relative; width: 100%; height: 100%; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    video::cue { font-size: 1.1em; color: #fff; background-color: rgba(0,0,0,0.75); font-family: Arial; line-height: 1.5; }

    #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: #aaa; font-size: 14px; text-align: center; z-index: 10; }
    .spinner { width: 36px; height: 36px; border: 3px solid #333; border-top-color: #e50; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error { display: none; position: absolute; inset: 0; align-items: center; justify-content: center; flex-direction: column; text-align: center; color: #ff6b6b; padding: 20px; font-size: 15px; line-height: 1.7; z-index: 10; }

    #sub-badge { display: none; position: absolute; top: 12px; right: 12px; background: rgba(0,180,0,0.85); color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 20px; z-index: 20; pointer-events: none; }

    /* زر fullscreen */
    #fs-btn {
      position: absolute;
      bottom: 60px;
      right: 12px;
      width: 44px; height: 44px;
      background: rgba(0,0,0,0.65);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 30;
      transition: opacity 0.3s, background 0.2s;
    }
    #fs-btn:active { background: rgba(255,255,255,0.15); }
    #fs-btn svg { width: 22px; height: 22px; fill: #fff; }
  </style>
</head>
<body>
<div id="video-wrap">
  <div id="overlay"><div class="spinner"></div><span>⏳ جارٍ التحميل...</span></div>
  <div id="error">❌ تعذّر تشغيل الفيلم.<br><small style="color:#aaa">جرّب سيرفراً آخر.</small></div>
  <div id="sub-badge">🇸🇦 ترجمة عربية</div>
  <video id="player" controls playsinline crossorigin="anonymous"></video>

  <button id="fs-btn" title="ملء الشاشة">
    <!-- أيقونة expand -->
    <svg id="ico-expand" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    <!-- أيقونة exit -->
    <svg id="ico-exit"   viewBox="0 0 24 24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
  </button>
</div>

<script>
  const params  = new URLSearchParams(location.search);
  const src     = params.get('url');
  const subSrc  = params.get('sub');

  const video   = document.getElementById('player');
  const overlay = document.getElementById('overlay');
  const errBox  = document.getElementById('error');
  const badge   = document.getElementById('sub-badge');
  const fsBtn   = document.getElementById('fs-btn');
  const icoExp  = document.getElementById('ico-expand');
  const icoExit = document.getElementById('ico-exit');

  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  // ── Fullscreen ───────────────────────────────────────────
  // تيليجرام يوفر tg.requestFullscreen() الخاص به
  // نستخدمه أولاً، ثم native كـ fallback
  let tgIsFullscreen = false;

  function enterFullscreen() {
    if (tg?.requestFullscreen) {
      // Telegram WebApp API الرسمي
      tg.requestFullscreen();
      tgIsFullscreen = true;
      updateIcon(true);
    } else {
      // fallback للمتصفح العادي
      const el = document.documentElement;
      (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen)?.call(el);
    }
  }

  function exitFullscreen() {
    if (tg?.exitFullscreen) {
      tg.exitFullscreen();
      tgIsFullscreen = false;
      updateIcon(false);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen)?.call(document);
    }
  }

  function updateIcon(isFS) {
    icoExp.style.display  = isFS ? 'none'  : 'block';
    icoExit.style.display = isFS ? 'block' : 'none';
  }

  fsBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    tgIsFullscreen ? exitFullscreen() : enterFullscreen();
  });

  // مزامنة أيقونة الـ fullscreen مع أحداث المتصفح
  ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(ev => {
    document.addEventListener(ev, () => {
      const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
      tgIsFullscreen = isFS;
      updateIcon(isFS);
    });
  });

  // مزامنة مع حدث تيليجرام fullscreen
  if (tg) {
    tg.onEvent?.('fullscreen_changed', (data) => {
      tgIsFullscreen = data?.is_fullscreen ?? false;
      updateIcon(tgIsFullscreen);
    });
  }

  // ── Player ───────────────────────────────────────────────
  function showError()   { overlay.style.display = 'none'; errBox.style.display = 'flex'; }
  function hideOverlay() { overlay.style.display = 'none'; }

  async function attachSubtitle() {
    if (!subSrc) return;
    try {
      const decoded = decodeURIComponent(subSrc);
      let vttText;
      if (decoded.startsWith('data:')) {
        vttText = decodeURIComponent(escape(atob(decoded.split(',')[1])));
      } else {
        vttText = await (await fetch(decoded)).text();
      }
      if (!vttText.trimStart().startsWith('WEBVTT')) vttText = 'WEBVTT\n\n' + vttText;
      const blobUrl = URL.createObjectURL(new Blob([vttText], { type: 'text/vtt' }));
      while (video.firstChild) video.removeChild(video.firstChild);
      const track = document.createElement('track');
      Object.assign(track, { kind:'subtitles', label:'العربية', srclang:'ar', src:blobUrl, default:true });
      video.appendChild(track);
      track.addEventListener('load', () => {
        badge.style.display = 'block';
        for (let t of video.textTracks) if (t.language === 'ar') { t.mode = 'showing'; break; }
      });
      setTimeout(() => {
        for (let t of video.textTracks) if (t.language==='ar' && t.mode!=='showing') { t.mode='showing'; badge.style.display='block'; }
      }, 1000);
    } catch(e) { console.warn('Subtitle error:', e); }
  }

  if (!src) { showError(); }
  else if (Hls.isSupported() && !decodeURIComponent(src).includes('.mp4')) {
    const hls = new Hls({ enableWorker: false });
    hls.loadSource(decodeURIComponent(src));
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { hideOverlay(); attachSubtitle(); video.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) showError(); });
  } else {
    video.src = decodeURIComponent(src);
    video.addEventListener('canplay',  () => { hideOverlay(); attachSubtitle(); video.play().catch(()=>{}); });
    video.addEventListener('error', showError);
  }
</script>
</body>
</html>

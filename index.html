<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>مشغّل الأفلام</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #000;
      width: 100%; height: 100%;
      overflow: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .tg-header, [data-telegram-header] { display: none !important; }

    #video-wrap {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      display: flex; align-items: center;
      justify-content: center; background: #000;
    }

    video {
      width: 100vw; height: 100vh;
      object-fit: contain; background: #000;
    }

    video::cue {
      font-size: 1.1em; color: #fff;
      background-color: rgba(0,0,0,0.75);
      font-family: Arial; line-height: 1.5;
    }

    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: #aaa; font-size: 14px;
      font-family: Arial; z-index: 10;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid #333; border-top-color: #e55;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column; text-align: center;
      color: #ff6b6b; padding: 20px;
      font-size: 15px; line-height: 1.8;
      font-family: Arial; z-index: 10;
    }

    /* شارة الترجمة — تختفي مع باقي العناصر */
    #sub-badge {
      display: none; position: absolute;
      top: 14px; right: 14px;
      background: rgba(0,160,0,0.85);
      color: #fff; font-size: 12px;
      padding: 4px 12px; border-radius: 20px;
      z-index: 20; font-family: Arial;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    /* ── نظام الإخفاء التلقائي ── */
    /* الشريط العلوي لتيليجرام يُخفى عبر الـ header color
       لكن زر fullscreen نتحكم فيه نحن */

    #fs-btn {
      position: fixed;
      bottom: 28px; right: 14px;
      width: 46px; height: 46px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 30;
      /* انتقال سلس للإخفاء */
      opacity: 1;
      transition: opacity 0.4s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #fs-btn.hidden { opacity: 0; pointer-events: none; }
    #fs-btn svg { width: 24px; height: 24px; fill: #fff; }

    /* شريط التحكم السفلي للفيديو — يختفي تلقائياً أيضاً */
    video::-webkit-media-controls {
      opacity: 1;
      transition: opacity 0.4s ease;
    }
  </style>
</head>
<body>
<div id="video-wrap">
  <div id="overlay"><div class="spinner"></div><span>⏳ جارٍ التحميل...</span></div>
  <div id="error">❌ تعذّر تشغيل الفيلم.<br><small style="color:#aaa">جرّب سيرفراً آخر.</small></div>
  <div id="sub-badge">🇸🇦 ترجمة عربية</div>
  <video id="player" controls playsinline crossorigin="anonymous"></video>
  <button id="fs-btn">
    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
  </button>
</div>

<script>
  // ── Telegram WebApp init ──────────────────────────────
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor?.('#000000');
    tg.setBackgroundColor?.('#000000');
    tg.headerColor = '#000000';
    if (tg.isVersionAtLeast?.('6.1')) tg.setHeaderColor('#000000');
    if (tg.requestFullscreen) tg.requestFullscreen();
    tg.BackButton?.hide?.();
  }

  const params = new URLSearchParams(location.search);
  const src    = params.get('url');
  const subSrc = params.get('sub');

  const video   = document.getElementById('player');
  const overlay = document.getElementById('overlay');
  const errBox  = document.getElementById('error');
  const badge   = document.getElementById('sub-badge');
  const fsBtn   = document.getElementById('fs-btn');

  // ── نظام الإخفاء التلقائي بعد 5 ثواني ───────────────
  let hideTimer = null;

  function showControls() {
    // أظهر زر fullscreen
    fsBtn.classList.remove('hidden');
    // أظهر شريط تيليجرام العلوي مؤقتاً
    if (tg?.showSettingsButton) tg.showSettingsButton();
    // أعد ضبط المؤقت
    clearTimeout(hideTimer);
    hideTimer = setTimeout(hideControls, 5000);
  }

  function hideControls() {
    fsBtn.classList.add('hidden');
  }

  // ابدأ مخفياً بعد 3 ثواني من التحميل
  hideTimer = setTimeout(hideControls, 3000);

  // أظهر عند أي لمس أو نقر على الشاشة
  document.addEventListener('touchstart', showControls, { passive: true });
  document.addEventListener('click', showControls);

  // ── Fullscreen ──────────────────────────────────────────
  fsBtn.addEventListener('click', (e) => {
    e.stopPropagation(); // لا نُشغّل showControls مرتين
    if (tg?.requestFullscreen) { tg.requestFullscreen(); return; }
    if (video.webkitEnterFullscreen) { video.webkitEnterFullscreen(); return; }
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    if (req) req.call(el);
    showControls();
  });

  document.addEventListener('fullscreenchange', updateFsIcon);
  document.addEventListener('webkitfullscreenchange', updateFsIcon);
  function updateFsIcon() {
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsBtn.innerHTML = isFs
      ? `<svg viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>`;
  }

  // ── Player ────────────────────────────────────────────
  function showError()   { overlay.style.display = 'none'; errBox.style.display = 'flex'; }
  function hideOverlay() { overlay.style.display = 'none'; }

  async function attachSubtitle() {
    if (!subSrc) return;
    try {
      const decoded = decodeURIComponent(subSrc);
      let vttText;
      if (decoded.startsWith('data:')) {
        vttText = decodeURIComponent(escape(atob(decoded.split(',')[1])));
      } else {
        vttText = await (await fetch(decoded)).text();
      }
      if (!vttText.trimStart().startsWith('WEBVTT')) vttText = 'WEBVTT\n\n' + vttText;
      const blobUrl = URL.createObjectURL(new Blob([vttText], { type: 'text/vtt' }));
      while (video.firstChild) video.removeChild(video.firstChild);
      const track = document.createElement('track');
      track.kind = 'subtitles'; track.label = 'العربية';
      track.srclang = 'ar'; track.src = blobUrl; track.default = true;
      video.appendChild(track);
      track.addEventListener('load', () => {
        badge.style.display = 'block';
        for (let t of video.textTracks) if (t.language==='ar') { t.mode='showing'; break; }
      });
      setTimeout(() => {
        for (let t of video.textTracks)
          if (t.language==='ar' && t.mode!=='showing') { t.mode='showing'; badge.style.display='block'; }
      }, 1000);
    } catch(e) { console.warn('Subtitle error:', e); }
  }

  if (!src) { showError(); }
  else if (Hls.isSupported() && !decodeURIComponent(src).includes('.mp4')) {
    const hls = new Hls({ enableWorker: false });
    hls.loadSource(decodeURIComponent(src));
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { hideOverlay(); attachSubtitle(); video.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) showError(); });
  } else {
    video.src = decodeURIComponent(src);
    video.addEventListener('canplay', () => { hideOverlay(); attachSubtitle(); video.play().catch(()=>{}); });
    video.addEventListener('error', showError);
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>مشغّل</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#000; width:100%; height:100%; overflow:hidden; font-family:Arial,sans-serif; }

  /* ── iframe mode (مسلسلات) ── */
  #iframe-wrap {
    display:none;
    position:fixed; inset:0;
    background:#000;
    z-index:5;
  }
  #iframe-wrap iframe {
    width:100%; height:100%;
    border:none;
  }

  /* ── video mode (أفلام) ── */
  #video-wrap {
    display:none;
    position:fixed; inset:0;
    background:#000;
    z-index:5;
  }
  video {
    width:100%; height:100%;
    object-fit:contain;
    background:#000;
  }

  /* ── loading ── */
  #loading {
    position:fixed; inset:0;
    background:#000;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:#fff; gap:14px; z-index:10;
  }
  .spinner {
    width:48px; height:48px;
    border:4px solid #333;
    border-top-color:#4fc3f7;
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loading p { font-size:15px; opacity:.8; }

  /* ── error ── */
  #error {
    display:none;
    position:fixed; inset:0;
    background:#0a0a0a;
    align-items:center; justify-content:center;
    flex-direction:column; gap:16px;
    padding:24px; text-align:center; color:#fff; z-index:10;
  }
  #error .icon { font-size:48px; }
  #error h2 { font-size:18px; }
  #error p  { font-size:13px; color:#aaa; line-height:1.6; }
  .btn-retry {
    background:#1e88e5; cursor:pointer; border:none; color:#fff;
    padding:12px 28px; border-radius:8px; font-size:15px;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>جارٍ تحميل...</p>
</div>

<div id="error">
  <div class="icon">📡</div>
  <h2>تعذّر التشغيل</h2>
  <p>تأكد من اتصالك بالإنترنت ثم أعد المحاولة.</p>
  <button class="btn-retry" onclick="location.reload()">🔄 إعادة المحاولة</button>
</div>

<!-- iframe للمسلسلات -->
<div id="iframe-wrap">
  <iframe id="player-iframe" allowfullscreen allow="autoplay; fullscreen; encrypted-media"></iframe>
</div>

<!-- video للأفلام -->
<div id="video-wrap">
  <video id="video" controls playsinline webkit-playsinline></video>
</div>

<script>
  const params     = new URLSearchParams(location.search);
  const iframeUrl  = params.get("iframe") ? decodeURIComponent(params.get("iframe")) : "";
  const streamUrl  = params.get("url")    ? decodeURIComponent(params.get("url"))    : "";
  const subUrl     = params.get("sub")    ? decodeURIComponent(params.get("sub"))    : "";

  const loading     = document.getElementById("loading");
  const errDiv      = document.getElementById("error");
  const iframeWrap  = document.getElementById("iframe-wrap");
  const videoWrap   = document.getElementById("video-wrap");
  const iframe      = document.getElementById("player-iframe");
  const video       = document.getElementById("video");

  // ── Telegram WebApp ──
  if (window.Telegram?.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    try { tg.requestFullscreen?.(); } catch(e){}
    try { navigator.wakeLock?.request("screen"); } catch(e){}
  }

  function hideLoading() { loading.style.display = "none"; }
  function showError()   { hideLoading(); errDiv.style.display = "flex"; }

  // ══════════════════════════════════════════════
  //  وضع iframe — مسلسلات وأفلام embed
  // ══════════════════════════════════════════════
  if (iframeUrl) {
    iframeWrap.style.display = "block";
    iframe.src = iframeUrl;

    // نخفي loading بعد ثانيتين لأن iframe يحمّل بنفسه
    iframe.addEventListener("load", hideLoading, { once: true });
    setTimeout(hideLoading, 3000);

    // لو بعد 15 ثانية الـ iframe مافيه محتوى → خطأ
    setTimeout(() => {
      try {
        if (!iframe.contentDocument?.body?.innerHTML) showError();
      } catch(e) {
        // cross-origin = محتوى موجود لكن لا نستطيع قراءته → طبيعي
        hideLoading();
      }
    }, 15000);

  // ══════════════════════════════════════════════
  //  وضع video — روابط HLS مباشرة
  // ══════════════════════════════════════════════
  } else if (streamUrl) {
    videoWrap.style.display = "block";

    function addSubtitle() {
      if (!subUrl) return;
      const t = document.createElement("track");
      t.kind = "subtitles"; t.label = "العربية";
      t.srclang = "ar"; t.src = subUrl; t.default = true;
      video.appendChild(t);
    }

    let hlsInstance = null;

    function tryNative() {
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      video.src = streamUrl;
      video.load();
      video.addEventListener("canplay", () => { hideLoading(); video.play().catch(()=>{}); }, { once:true });
      video.addEventListener("error", showError, { once:true });
      setTimeout(() => { if (loading.style.display !== "none") showError(); }, 10000);
    }

    if (Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker:true, lowLatencyMode:true });
      hlsInstance.loadSource(streamUrl);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        hideLoading();
        addSubtitle();
        video.play().catch(()=>{});
      });
      hlsInstance.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) tryNative();
      });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = streamUrl;
      video.addEventListener("loadedmetadata", () => {
        hideLoading(); addSubtitle(); video.play().catch(()=>{});
      }, { once:true });
      video.addEventListener("error", tryNative, { once:true });
    } else {
      tryNative();
    }

  } else {
    showError();
  }
</script>
</body>
</html>

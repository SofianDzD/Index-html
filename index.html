<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشغّل الأفلام</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    video {
      width: 100%;
      max-height: 100vh;
      background: #000;
    }

    video::cue {
      font-size: 1.1em;
      color: #ffffff;
      background-color: rgba(0, 0, 0, 0.75);
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }

    /* ── iframe للمسلسلات ── */
    #iframe-wrap {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 5;
    }
    #iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #aaa;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    #overlay .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #e50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none;
      position: absolute;
      text-align: center;
      color: #ff6b6b;
      padding: 20px;
      font-size: 15px;
      line-height: 1.7;
    }

    #sub-badge {
      display: none;
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,180,0,0.85);
      color: #fff;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- وضع المسلسلات: iframe مباشر -->
  <div id="iframe-wrap">
    <iframe id="tv-iframe"
      allowfullscreen
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture">
    </iframe>
  </div>

  <!-- وضع الأفلام -->
  <div id="overlay">
    <div class="spinner"></div>
    <span>⏳ جارٍ تحميل المشغّل...</span>
  </div>

  <div id="error">
    ❌ تعذّر تشغيل الفيلم.<br>
    <small style="color:#aaa">جرّب سيرفراً آخر من البوت.</small>
  </div>

  <div id="sub-badge">🇸🇦 ترجمة عربية</div>

  <video id="player" controls playsinline crossorigin="anonymous"></video>

  <script>
    const params    = new URLSearchParams(location.search);
    const iframeSrc = params.get('iframe') ? decodeURIComponent(params.get('iframe')) : null;
    const src       = params.get('url');
    const subSrc    = params.get('sub');

    const video     = document.getElementById('player');
    const overlay   = document.getElementById('overlay');
    const errBox    = document.getElementById('error');
    const badge     = document.getElementById('sub-badge');
    const iframeWrap= document.getElementById('iframe-wrap');
    const tvIframe  = document.getElementById('tv-iframe');

    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      try { window.Telegram.WebApp.requestFullscreen?.(); } catch(e) {}
    }

    // ══════════════════════════════════════════
    //  وضع المسلسلات — iframe مباشر
    // ══════════════════════════════════════════
    if (iframeSrc) {
      iframeWrap.style.display = 'block';
      overlay.style.display    = 'none';
      video.style.display      = 'none';
      tvIframe.src = iframeSrc;

    // ══════════════════════════════════════════
    //  وضع الأفلام — HLS / MP4
    // ══════════════════════════════════════════
    } else {

      function showError() {
        overlay.style.display = 'none';
        errBox.style.display  = 'block';
      }

      function hideOverlay() {
        overlay.style.display = 'none';
      }

      async function attachSubtitle() {
        if (!subSrc) return;
        try {
          const decoded = decodeURIComponent(subSrc);
          let vttText;

          if (decoded.startsWith('data:')) {
            const base64 = decoded.split(',')[1];
            vttText = decodeURIComponent(escape(atob(base64)));
          } else {
            const res = await fetch(decoded);
            vttText = await res.text();
          }

          if (!vttText.trimStart().startsWith('WEBVTT')) {
            vttText = 'WEBVTT\n\n' + vttText;
          }

          const blob    = new Blob([vttText], { type: 'text/vtt' });
          const blobUrl = URL.createObjectURL(blob);

          while (video.firstChild) video.removeChild(video.firstChild);

          const track   = document.createElement('track');
          track.kind    = 'subtitles';
          track.label   = 'العربية';
          track.srclang = 'ar';
          track.src     = blobUrl;
          track.default = true;
          video.appendChild(track);

          track.addEventListener('load', () => {
            badge.style.display = 'block';
            for (let t of video.textTracks) {
              if (t.language === 'ar') { t.mode = 'showing'; break; }
            }
          });

          setTimeout(() => {
            for (let t of video.textTracks) {
              if (t.language === 'ar' && t.mode !== 'showing') {
                t.mode = 'showing';
                badge.style.display = 'block';
              }
            }
          }, 1000);

        } catch (e) {
          console.warn('Subtitle attach failed:', e);
        }
      }

      if (!src) {
        showError();
      } else if (Hls.isSupported() && !src.includes('.mp4')) {
        const hls = new Hls({ enableWorker: false });
        hls.loadSource(decodeURIComponent(src));
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          hideOverlay();
          attachSubtitle();
          video.play().catch(() => {});
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (data.fatal) showError();
        });
      } else {
        video.src = decodeURIComponent(src);
        video.addEventListener('canplay', () => {
          hideOverlay();
          attachSubtitle();
          video.play().catch(() => {});
        });
        video.addEventListener('error', showError);
      }
    }
  </script>
</body>
</html>
